---
# roles/odoo/tasks/config.yml
#
# Déploie odoo.conf. Le service n'est PAS démarré ici — init.yml le fait après
# l'initialisation de la base, pour éviter tout conflit de port ou de lock DB.

- name: "config | Déployer /etc/odoo/odoo.conf"
  ansible.builtin.template:
    src: odoo.conf.j2
    dest: "{{ odoo_config_file }}"
    owner: odoo
    group: odoo
    mode: "0640"
  notify: Redémarrer odoo
