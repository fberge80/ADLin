---
# roles/odoo/tasks/selinux.yml
#
# Le RPM Odoo inclut une policy SELinux (type odoo_t) qui autorise nativement
# les connexions réseau sortantes (LDAP, SMTP).
# On applique restorecon sur le répertoire de données pour corriger d'éventuels
# contextes incorrects si le répertoire a été créé avant l'installation du RPM.

- name: "selinux | Restaurer les contextes SELinux sur le répertoire de données Odoo"
  ansible.builtin.command: "restorecon -Rv {{ odoo_data_dir }}"
  register: odoo_restorecon
  changed_when: "'Relabeled' in odoo_restorecon.stdout"
