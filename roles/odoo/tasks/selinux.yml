---
# roles/odoo/tasks/selinux.yml
# Docker + SELinux enforcing : container_manage_cgroup requis.

- name: "selinux | Activer container_manage_cgroup (requis par Docker + systemd)"
  ansible.posix.seboolean:
    name: container_manage_cgroup
    state: true
    persistent: true

- name: "selinux | Activer virt_sandbox_use_sys_admin (nécessaire pour bind mounts)"
  ansible.posix.seboolean:
    name: virt_sandbox_use_sys_admin
    state: true
    persistent: true

- name: "selinux | Vérifier que SELinux reste en mode enforcing"
  ansible.builtin.command: getenforce
  register: odoo_selinux_mode
  changed_when: false
  failed_when: odoo_selinux_mode.stdout != "Enforcing"
