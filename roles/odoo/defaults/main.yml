---
# roles/odoo/defaults/main.yml

odoo_hostname:            "erp01.adlin.lab"
odoo_fqdn_public:         "erp.adlin.lab"
odoo_version:             "19.0"
odoo_postgres_version:    "16"

# Ports — TLS terminé par proxy01
odoo_port:               8069
odoo_longpolling_port:   8072

# Workers multi-process (dimensionnement pour 2 vCPUs)
odoo_workers:            4
odoo_max_cron_threads:   2

# PostgreSQL (dans le conteneur, pas sur l'hôte)
odoo_db_name:            "odoo"
odoo_db_user:            "odoo"
# Le mot de passe est défini dans group_vars/all/vars.yml
# (indirection vault) — pas de valeur en clair ici.

# Chemins
odoo_data_dir:           "/opt/odoo"

# LDAP — configuré manuellement après déploiement (pas en auto via env vars officiels Odoo)
odoo_ldap_bind_dn:       "uid=svc_odoo,cn=sysaccounts,cn=etc,{{ freeipa_base_dn }}"
odoo_ldap_bind_pass:     "{{ ldap_bind_password_odoo }}"
odoo_ldap_base:          "{{ freeipa_base_dn }}"
odoo_ldap_filter:        "(memberOf=cn=odoo_users,cn=groups,cn=accounts,{{ freeipa_base_dn }})"
