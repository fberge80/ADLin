---
# roles/reverse_proxy/tasks/install.yml
#
# Nginx est dans les dépôts AppStream de Rocky Linux 9.
#
# Note : certmonger n'est PAS installé ici. La signature du certificat
# multi-SAN est faite en déléguant `ipa cert-request` sur ipa01 (admin),
# pas via certmonger local. Voir tasks/certmonger.yml.

- name: "install | Installer nginx"
  ansible.builtin.dnf:
    name:
      - nginx
    state: present

- name: "install | Démarrer et activer nginx"
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

# Le répertoire /etc/pki/tls/private/ doit exister avec les bons droits
# Il est créé par le paquet openssl-libs mais la vérification est idempotente
- name: "install | Vérifier le répertoire des clés privées"
  ansible.builtin.file:
    path: /etc/pki/tls/private
    state: directory
    owner: root
    group: root
    mode: "0700"
