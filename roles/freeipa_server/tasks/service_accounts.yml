---
# roles/freeipa_server/tasks/service_accounts.yml
#
# Création des comptes de service dans cn=sysaccounts,cn=etc,dc=adlin,dc=lab.
#
# Pourquoi cn=sysaccounts et non des utilisateurs IPA normaux ?
#   Les comptes dans cn=sysaccounts sont des entrées LDAP "système" qui :
#     - Ne sont pas soumis aux politiques de mot de passe IPA (expiration, complexité)
#     - N'apparaissent pas dans l'interface web IPA ni dans les groupes utilisateurs
#     - Ne peuvent pas initier de sessions Kerberos (pas de principal associé)
#     - Ont uniquement des droits en lecture sur l'annuaire
#   C'est le pattern recommandé par Red Hat pour les bind accounts applicatifs.
#
# Le module community.general.ldap_entry gère l'idempotence nativement :
# state: present ne modifie rien si l'entrée existe déjà avec les mêmes attributs.
#
# Prérequis : python3-ldap installé sur le nœud géré (ajouté dans packages.yml
# du rôle freeipa_server via la tâche packages ci-dessous).

- name: "service_accounts | Installer python3-ldap (requis par community.general.ldap_entry)"
  ansible.builtin.dnf:
    name: python3-ldap
    state: present

- name: "service_accounts | Créer les comptes de service dans cn=sysaccounts"
  community.general.ldap_entry:
    dn: "uid={{ item.uid }},cn=sysaccounts,cn=etc,{{ freeipa_base_dn }}"
    objectClass:
      - account
      - simpleSecurityObject
    attributes:
      uid: "{{ item.uid }}"
      userPassword: "{{ item.password }}"
      description: "{{ item.description }}"
      # Désactiver l'expiration du mot de passe (timestamp = année 2038 max UNIX)
      passwordExpirationTime: "20380119031407Z"
      nsAccountLock: "false"
    bind_dn: "cn=Directory Manager"
    bind_pw: "{{ vault_ipa_dm_password }}"
    server_uri: "ldap://localhost"
    state: present
  loop: "{{ freeipa_service_accounts }}"
  loop_control:
    label: "{{ item.uid }}"
  no_log: true   # masquer les mots de passe dans les logs Ansible
