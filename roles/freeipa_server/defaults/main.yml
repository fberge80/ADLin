---
# roles/freeipa_server/defaults/main.yml
#
# Seules les variables propres au rôle sont définies ici (préfixe freeipa_server_).
# Les variables ipaserver_* consommées par la collection freeipa.ansible_freeipa
# sont définies dans inventory/production/group_vars/ipaservers.yml — elles
# appartiennent à la couche inventaire, pas aux defaults d'un rôle.

# -----------------------------------------------------------------------------
# Comptes de service LDAP
# -----------------------------------------------------------------------------

freeipa_server_service_accounts:
  - uid: svc_nextcloud
    description: "Compte de service Nextcloud — lecture LDAP"
    password: "{{ ldap_bind_password_nextcloud }}"
  - uid: svc_mail
    description: "Compte de service Postfix/Dovecot/SOGo — lookup LDAP"
    password: "{{ ldap_bind_password_mail }}"
  - uid: svc_odoo
    description: "Compte de service Odoo — authentification LDAP"
    password: "{{ ldap_bind_password_odoo }}"
  - uid: svc_rocketchat
    description: "Compte de service Rocket.Chat — sync LDAP/groupes"
    password: "{{ ldap_bind_password_rocketchat }}"

# -----------------------------------------------------------------------------
# Groupes applicatifs FreeIPA
# -----------------------------------------------------------------------------

freeipa_server_app_groups:
  - name: nextcloud_users
    description: "Utilisateurs autorisés à accéder à Nextcloud"
  - name: mail_users
    description: "Utilisateurs disposant d'une boîte mail"
  - name: odoo_users
    description: "Utilisateurs autorisés à accéder à Odoo"
  - name: chat_users
    description: "Utilisateurs autorisés à accéder à Rocket.Chat"
