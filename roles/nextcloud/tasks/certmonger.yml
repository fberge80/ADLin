---
# roles/nextcloud/tasks/certmonger.yml
#
# Demande un certificat TLS via certmonger et la CA FreeIPA (Dogtag).
#   CN/SAN = cloud01.adlin.lab (nom interne de la VM)
#   Le FQDN public (cloud.adlin.lab) est couvert par le certificat multi-SAN de proxy01.

- name: "certmonger | Vérifier les certificats déjà suivis"
  ansible.builtin.command: getcert list
  register: nextcloud_getcert_list
  changed_when: false

- name: "certmonger | Nettoyer l'ancienne requête bloquée et les fichiers cert/key"
  ansible.builtin.shell: |
    set +e
    REQUEST_ID=$(getcert list 2>/dev/null \
      | grep -B5 '{{ nextcloud_cert_path }}' \
      | grep 'Request ID' | head -1 | awk '{print $NF}' | tr -d "'")
    # Fallback: si le fichier a déjà été supprimé, chercher par nickname connu
    if [ -z "$REQUEST_ID" ]; then
      REQUEST_ID=$(getcert list 2>/dev/null \
        | grep 'Request ID' | head -1 | awk '{print $NF}' | tr -d "'")
    fi
    if [ -n "$REQUEST_ID" ]; then
      getcert stop-tracking -i "$REQUEST_ID" 2>/dev/null
    fi
    rm -f {{ nextcloud_cert_path }} {{ nextcloud_key_path }}
  args:
    executable: /bin/bash
  when:
    - nextcloud_cert_path in nextcloud_getcert_list.stdout
    - "nextcloud_getcert_list.stdout is search('(CA_UNREACHABLE|CA_REJECTED)')"
  changed_when: true
  failed_when: false

- name: "certmonger | Demander le certificat TLS à FreeIPA CA"
  ansible.builtin.shell: >-
    ipa-getcert request
    -f {{ nextcloud_cert_path }}
    -k {{ nextcloud_key_path }}
    -K HTTP/{{ nextcloud_hostname }}@{{ ipa_realm }}
    -N "CN={{ nextcloud_hostname }}"
    -D {{ nextcloud_hostname }}
  when: (nextcloud_cert_path not in nextcloud_getcert_list.stdout) or nextcloud_getcert_list.stdout is search('(CA_UNREACHABLE|CA_REJECTED)')
  changed_when: true

- name: "certmonger | Attendre la délivrance du certificat par Dogtag"
  ansible.builtin.command: getcert list -f {{ nextcloud_cert_path }}
  register: nextcloud_cert_status
  until: "'status: MONITORING' in nextcloud_cert_status.stdout"
  retries: "{{ nextcloud_cert_wait_retries }}"
  delay: "{{ nextcloud_cert_wait_delay }}"
  changed_when: false

- name: "certmonger | Afficher l'état du certificat"
  ansible.builtin.debug:
    msg: "{{ nextcloud_cert_status.stdout_lines }}"
