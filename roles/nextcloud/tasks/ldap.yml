---
# roles/nextcloud/tasks/ldap.yml
#
# Configure l'authentification LDAP FreeIPA via occ.
#
# ipaUniqueID comme attribut UUID : valeur stable assignée par FreeIPA à chaque
# entrée, contrairement à entryUUID qui peut changer. Sans cet attribut, Nextcloud
# duplique les comptes utilisateurs à chaque reconnexion LDAP.

- name: "ldap | Vérifier que FreeIPA LDAP est accessible"
  ansible.builtin.wait_for:
    host: "{{ nextcloud_ldap_host | regex_replace('ldaps://', '') | regex_replace(':.*', '') }}"
    port: 636
    timeout: 30

- name: "ldap | Activer l'application user_ldap"
  ansible.builtin.command:
    cmd: php {{ nextcloud_webroot }}/occ app:enable user_ldap
  become: true
  become_user: apache
  register: nextcloud_app_enable_result
  changed_when: "'already enabled' not in nextcloud_app_enable_result.stdout"
  retries: 3
  delay: 10

# Création de la config vide et récupération du préfixe en une seule passe
- name: "ldap | Créer une config LDAP vide (idempotent)"
  ansible.builtin.command:
    cmd: php {{ nextcloud_webroot }}/occ ldap:create-empty-config
  become: true
  become_user: apache
  register: nextcloud_ldap_create
  changed_when: "'already exists' not in nextcloud_ldap_create.stderr"
  failed_when: nextcloud_ldap_create.rc != 0 and 'already exists' not in nextcloud_ldap_create.stderr

# Extrait le préfixe de la sortie "Saved empty configuration for s01" (NC < 34)
# ou "Created new configuration with configID s01" (NC 34+)
# Note: stdout est vide si la config existe déjà → fallback sur 's01'
- name: "ldap | Déterminer le préfixe de la config LDAP"
  ansible.builtin.set_fact:
    nextcloud_ldap_config_prefix: >-
      {{ nextcloud_ldap_create.stdout
         | regex_replace('.*(?:for|configID)\\s+(\\S+).*', '\\1')
         | default('s01', true) }}

- name: "ldap | Vérifier que le préfixe LDAP est valide"
  ansible.builtin.set_fact:
    nextcloud_ldap_config_prefix: "s01"
  when: nextcloud_ldap_config_prefix | length == 0 or nextcloud_ldap_config_prefix == nextcloud_ldap_create.stdout

- name: "ldap | Afficher le préfixe LDAP actif"
  ansible.builtin.debug:
    msg: "Configuration LDAP active : {{ nextcloud_ldap_config_prefix }}"

- name: "ldap | Serveur LDAP (host)"
  ansible.builtin.command:
    cmd: >
      php {{ nextcloud_webroot }}/occ ldap:set-config
      {{ nextcloud_ldap_config_prefix }} ldapHost {{ nextcloud_ldap_host }}
  become: true
  become_user: apache
  changed_when: false

- name: "ldap | Port LDAP (636 — LDAPS)"
  ansible.builtin.command:
    cmd: >
      php {{ nextcloud_webroot }}/occ ldap:set-config
      {{ nextcloud_ldap_config_prefix }} ldapPort 636
  become: true
  become_user: apache
  changed_when: false

- name: "ldap | DN du compte de service"
  ansible.builtin.command:
    cmd: >
      php {{ nextcloud_webroot }}/occ ldap:set-config
      {{ nextcloud_ldap_config_prefix }} ldapAgentName "{{ nextcloud_ldap_bind_dn }}"
  become: true
  become_user: apache
  changed_when: false

# Note: Le mot de passe LDAP est passé directement en ligne de commande,
# ce qui peut être visible dans les logs système. Nous utilisons no_log: true
# pour minimiser cette exposition.
- name: "ldap | Mot de passe du compte de service"
  ansible.builtin.command:
    cmd: >
      php {{ nextcloud_webroot }}/occ ldap:set-config
      {{ nextcloud_ldap_config_prefix }} ldapAgentPassword "{{ nextcloud_ldap_bind_pass }}"
  become: true
  become_user: apache
  changed_when: false
  no_log: true

- name: "ldap | Base DN"
  ansible.builtin.command:
    cmd: >
      php {{ nextcloud_webroot }}/occ ldap:set-config
      {{ nextcloud_ldap_config_prefix }} ldapBase "{{ nextcloud_ldap_base_dn }}"
  become: true
  become_user: apache
  changed_when: false

- name: "ldap | Filtre utilisateurs (groupe nextcloud_users)"
  ansible.builtin.command:
    cmd: >
      php {{ nextcloud_webroot }}/occ ldap:set-config
      {{ nextcloud_ldap_config_prefix }} ldapUserFilter "{{ nextcloud_ldap_user_filter }}"
  become: true
  become_user: apache
  changed_when: false

- name: "ldap | Attribut UUID → ipaUniqueID (évite les doublons de comptes)"
  ansible.builtin.command:
    cmd: >
      php {{ nextcloud_webroot }}/occ ldap:set-config
      {{ nextcloud_ldap_config_prefix }} ldapUuidUserAttribute ipaUniqueID
  become: true
  become_user: apache
  changed_when: false

- name: "ldap | Filtre de connexion (login = uid)"
  ansible.builtin.command:
    cmd: >
      php {{ nextcloud_webroot }}/occ ldap:set-config
      {{ nextcloud_ldap_config_prefix }} ldapLoginFilter "uid=%uid"
  become: true
  become_user: apache
  changed_when: false

- name: "ldap | Activer la configuration LDAP"
  ansible.builtin.command:
    cmd: >
      php {{ nextcloud_webroot }}/occ ldap:set-config
      {{ nextcloud_ldap_config_prefix }} ldapConfigurationActive 1
  become: true
  become_user: apache
  changed_when: false
