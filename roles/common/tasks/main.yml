---
- name: "Common | SELinux enforcing"
  ansible.builtin.import_tasks: selinux.yml
  tags: [common, selinux]

- name: "Common | Paquets de base et dépôt EPEL"
  ansible.builtin.import_tasks: packages.yml
  tags: [common, packages]

- name: "Common | Hostname FQDN depuis l'inventaire"
  ansible.builtin.import_tasks: hostname.yml
  tags: [common, hostname]

- name: "Common | Synchronisation NTP (chrony)"
  ansible.builtin.import_tasks: chrony.yml
  tags: [common, chrony, ntp]
  when: common_manage_ntp | bool
  # Désactivé sur ipaservers : FreeIPA server installer gère chrony lui-même

- name: "Common | Firewalld"
  ansible.builtin.import_tasks: firewalld.yml
  tags: [common, firewalld]

- name: "Common | Enrollment FreeIPA client"
  ansible.builtin.import_tasks: freeipa_client.yml
  tags: [common, freeipa, ipa]
  when: common_ipa_enroll | bool
  # Désactivé sur ipaservers : ipa01 est le serveur, pas un client

- name: "Common | Démarrer qemu-guest-agent"
  ansible.builtin.systemd:
    name: qemu-guest-agent
    state: started
    enabled: true
  tags: [common, packages]
  # Notifié par l'installation du paquet dans packages.yml
  # Présent ici en idempotence pour les runs ultérieurs
