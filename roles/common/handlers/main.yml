---
# roles/common/handlers/main.yml

- name: Redémarrer chrony
  ansible.builtin.systemd:
    name: chronyd
    state: restarted

- name: Reboot si SELinux a changé de mode
  ansible.builtin.reboot:
    msg: "Reboot requis suite au changement de mode SELinux"
    reboot_timeout: 300
  when: common_selinux_result.reboot_required | default(false)

- name: Redémarrer qemu-guest-agent
  ansible.builtin.systemd:
    name: qemu-guest-agent
    state: restarted
    enabled: true
