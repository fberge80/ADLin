---
# roles/freepbx/tasks/ipa_client.yml
# Enrollment de pbx01 comme client FreeIPA sur Debian 12.
# Fournit : SSH centralisé, sudo via hbac IPA, keytab Kerberos.
# L'authentification SIP FreePBX reste locale (pas d'intégration LDAP native).

- name: "ipa_client | Installer freeipa-client (Debian)"
  ansible.builtin.apt:
    name: freeipa-client
    state: present

- name: "ipa_client | Vérifier si pbx01 est déjà enrollé"
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: freepbx_ipa_enrolled

- name: "ipa_client | Enroller pbx01 comme client IPA"
  ansible.builtin.command: >
    ipa-client-install
      --domain {{ ipa_domain }}
      --server {{ ipa_server }}
      --realm {{ ipa_realm }}
      --principal admin
      --password {{ ipa_admin_password }}
      --mkhomedir
      --unattended
  when: not freepbx_ipa_enrolled.stat.exists
  no_log: true
  changed_when: true
  register: freepbx_ipa_client_result
  failed_when: >
    freepbx_ipa_client_result.rc != 0 and
    "already enrolled" not in freepbx_ipa_client_result.stderr

- name: "ipa_client | Vérifier le keytab Kerberos"
  ansible.builtin.command: klist -k /etc/krb5.keytab
  register: freepbx_keytab_check
  changed_when: false
  failed_when: freepbx_keytab_check.rc != 0

- name: "ipa_client | Afficher le succès de l'enrollment"
  ansible.builtin.debug:
    msg: "pbx01 a été enrollé avec succès comme client FreeIPA"
  when: freepbx_ipa_client_result is succeeded
