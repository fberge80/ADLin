---
# roles/mailserver/tasks/certmonger.yml
#
# Obtient un certificat TLS multi-SAN signé par le CA FreeIPA (Dogtag).
#
# Pourquoi ce flux (CSR openssl + ipa cert-request) et pas certmonger ?
#   certmonger s'authentifie avec le keytab host/mail01 (qui n'a pas les droits
#   LDAP pour déposer le certificat si le SAN pointe vers un autre host).
#   Le keytab admin contourne ces restrictions ACI.
#
# Flux :
#   1. Vérifier expiration du cert existant (> 30 jours restants = skip)
#   2. Générer clé privée + CSR sur mail01 (openssl + addext SAN)
#   3. Récupérer le CSR sur le control node
#   4. Déléguer ipa cert-request sur ipa01 (admin)
#   5. Distribuer le certificat PEM sur mail01
#   6. Nettoyer les fichiers temporaires

# ── 1. Vérifier si le certificat existant est valide (> 30 jours restants) ──

- name: "certmonger | Vérifier l'expiration du certificat existant"
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -f {{ mailserver_cert_path }} ]; then
      echo "ABSENT"
    else
      expiry=$(openssl x509 -enddate -noout -in {{ mailserver_cert_path }} \
               | cut -d= -f2)
      expiry_epoch=$(date -d "$expiry" +%s)
      now_epoch=$(date +%s)
      days_left=$(( (expiry_epoch - now_epoch) / 86400 ))
      if [ "$days_left" -lt 30 ]; then
        echo "EXPIRING_IN_${days_left}_DAYS"
      else
        echo "VALID_${days_left}_DAYS"
      fi
    fi
  register: mailserver_cert_status_check
  changed_when: false

- name: "certmonger | Afficher le statut du certificat"
  ansible.builtin.debug:
    msg: "Certificat mail01 : {{ mailserver_cert_status_check.stdout }}"

- name: "certmonger | Définir si le certificat doit être (re)généré"
  ansible.builtin.set_fact:
    mailserver_cert_needed: >-
      {{ 'ABSENT' in mailserver_cert_status_check.stdout
         or 'EXPIRING' in mailserver_cert_status_check.stdout }}

# ── 2. Construire la liste des SANs ──────────────────────────────────────────

- name: "certmonger | Construire l'extension SAN pour OpenSSL"
  ansible.builtin.set_fact:
    mailserver_san_openssl: >-
      DNS:{{ mailserver_hostname }},DNS:mail.{{ mailserver_domain }}

# ── 3. Générer clé privée + CSR sur mail01 ──────────────────────────────────

- name: "certmonger | Générer la clé privée et le CSR sur mail01"
  ansible.builtin.shell: |
    openssl req -new -newkey rsa:2048 -nodes \
      -keyout {{ mailserver_key_path }} \
      -out /tmp/mail01_multiSAN.csr \
      -subj "/CN={{ mailserver_hostname }}" \
      -addext "subjectAltName={{ mailserver_san_openssl }}" 2>/dev/null
    chmod 640 {{ mailserver_key_path }}
  when: mailserver_cert_needed | bool
  changed_when: true

# ── 4. Récupérer le CSR sur le control node ──────────────────────────────────

- name: "certmonger | Récupérer le CSR depuis mail01"
  ansible.builtin.fetch:
    src: /tmp/mail01_multiSAN.csr
    dest: /tmp/mail01_multiSAN.csr
    flat: true
  when: mailserver_cert_needed | bool

# ── 5. Signer le CSR sur ipa01 en tant qu'admin ──────────────────────────────

- name: "certmonger | Envoyer le CSR sur ipa01"
  ansible.builtin.copy:
    src: /tmp/mail01_multiSAN.csr
    dest: /tmp/mail01_multiSAN.csr
    mode: "0644"
  delegate_to: ipa01.adlin.lab
  when: mailserver_cert_needed | bool

- name: "certmonger | Signer le certificat multi-SAN via ipa cert-request (admin)"
  ansible.builtin.shell: |
    set -euo pipefail
    echo "{{ ipa_admin_password }}" | kinit admin 2>/dev/null
    ipa cert-request /tmp/mail01_multiSAN.csr \
      --principal=smtp/{{ mailserver_hostname }} \
      --profile-id=caIPAMultiSANCert \
      --certificate-out=/tmp/mail01_multiSAN.crt
    kdestroy -A 2>/dev/null
    echo "OK"
  delegate_to: ipa01.adlin.lab
  register: mailserver_cert_sign
  when: mailserver_cert_needed | bool
  changed_when: "'OK' in mailserver_cert_sign.stdout"
  no_log: true

# ── 6. Distribuer le certificat sur mail01 ──────────────────────────────────

- name: "certmonger | Récupérer le certificat signé depuis ipa01"
  ansible.builtin.fetch:
    src: /tmp/mail01_multiSAN.crt
    dest: /tmp/mail01_multiSAN.crt
    flat: true
  delegate_to: ipa01.adlin.lab
  when: mailserver_cert_needed | bool

- name: "certmonger | Déployer le certificat sur mail01"
  ansible.builtin.copy:
    src: /tmp/mail01_multiSAN.crt
    dest: "{{ mailserver_cert_path }}"
    mode: "0644"
    owner: root
    group: root
  when: mailserver_cert_needed | bool

# ── 7. Nettoyer les fichiers temporaires ─────────────────────────────────────

- name: "certmonger | Nettoyer les fichiers temporaires (ipa01)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/mail01_multiSAN.csr
    - /tmp/mail01_multiSAN.crt
  delegate_to: ipa01.adlin.lab
  when: mailserver_cert_needed | bool

- name: "certmonger | Nettoyer les fichiers temporaires (mail01)"
  ansible.builtin.file:
    path: /tmp/mail01_multiSAN.csr
    state: absent
  when: mailserver_cert_needed | bool

# ── 8. Vérification finale ───────────────────────────────────────────────────

- name: "certmonger | Vérifier le certificat déployé"
  ansible.builtin.shell: |
    openssl x509 -noout -subject -enddate -ext subjectAltName \
      -in {{ mailserver_cert_path }} 2>/dev/null
  register: mailserver_cert_verify
  changed_when: false

- name: "certmonger | Afficher le certificat déployé"
  ansible.builtin.debug:
    msg: "{{ mailserver_cert_verify.stdout_lines }}"
