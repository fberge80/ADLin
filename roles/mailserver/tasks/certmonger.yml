---
# roles/mailserver/tasks/certmonger.yml
#
# Demande un certificat TLS multi-SAN via certmonger et la CA FreeIPA (Dogtag).
# Le certificat couvre :
#   CN  = mail01.adlin.lab  (nom interne de la VM)
#   SAN = mail.adlin.lab    (FQDN exposé aux clients via reverse proxy)
#
# Principal Kerberos : smtp/mail01.adlin.lab@ADLIN.LAB
# Ce certificat est partagé par Postfix (STARTTLS 25/587) et Dovecot (IMAPS 993).
# C'est le plus petit dénominateur commun : les deux services ont besoin d'un
# certificat TLS valide, et certmonger ne demande qu'un seul certificat par
# chemin de fichier. Le nom du principal (smtp) est arbitraire — seul le chemin
# du fichier compte pour la distribution aux deux démons.
#
# Le module ipa_service.yml crée le principal correspondant dans FreeIPA

- name: "certmonger | Vérifier les certificats déjà suivis"
  ansible.builtin.command: getcert list
  register: mailserver_getcert_list
  changed_when: false

- name: "certmonger | Demander le certificat TLS à FreeIPA CA"
  ansible.builtin.shell: >
    ipa-getcert request
    -f {{ mailserver_cert_path }}
    -k {{ mailserver_key_path }}
    -K smtp/{{ mailserver_hostname }}@{{ ipa_realm }}
    -N "CN={{ mailserver_hostname }}"
    -D {{ mailserver_hostname }}
    -D mail.{{ mailserver_domain }}
  when: mailserver_cert_path not in mailserver_getcert_list.stdout
  changed_when: true

- name: "certmonger | Attendre la délivrance du certificat par Dogtag"
  ansible.builtin.command: getcert list -f {{ mailserver_cert_path }}
  register: mailserver_cert_status
  until: "'status: MONITORING' in mailserver_cert_status.stdout"
  retries: "{{ mailserver_cert_wait_retries }}"
  delay: "{{ mailserver_cert_wait_delay }}"
  changed_when: false
  failed_when: >
    mailserver_cert_status.stdout is defined and
    ("status: CA_UNREACHABLE" in mailserver_cert_status.stdout or
     "status: NEED_GUIDANCE" in mailserver_cert_status.stdout)

- name: "certmonger | Afficher l'état du certificat"
  ansible.builtin.debug:
    msg: "{{ mailserver_cert_status.stdout_lines }}"

- name: "certmonger | Erreur de délivrance du certificat"
  ansible.builtin.fail:
    msg: >
      Le certificat n'a pas pu être délivré par Dogtag CA.
      État actuel: {{ mailserver_cert_status.stdout_lines | join(\" \") }}
      Vérifiez la connectivité avec FreeIPA et les logs dans /var/log/ipaclient/ipaclient-install.log
  when: >
    mailserver_cert_status.stdout is defined and
    ("status: CA_UNREACHABLE" in mailserver_cert_status.stdout or
     "status: NEED_GUIDANCE" in mailserver_cert_status.stdout)
