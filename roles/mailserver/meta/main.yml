#   - Groupe FreeIPA mail_users créé (rôle freeipa_server)
#   - Compte de service svc_mail dans cn=sysaccounts (rôle freeipa_server)
#   - vault_sogo_db_password ajouté dans vault.yml (ansible-vault edit)
dependencies: []
