---
# playbooks/verify.yml
#
# Smoke tests post déploiement.
# Vérifie l état des fondations communes à toutes les VM Rocky Linux,
# puis ajoute des tests spécifiques par service au fur et à mesure des phases.

- name: "Vérification, fondations OS et FreeIPA client"
  hosts: rocky_hosts
  become: true
  gather_facts: false

  tasks:
    - name: "Verify | SELinux en mode enforcing"
      ansible.builtin.command: getenforce
      register: selinux_mode
      changed_when: false
      failed_when: selinux_mode.stdout != "Enforcing"

    - name: "Verify | Chronyd actif et synchronisé"
      ansible.builtin.command: chronyc tracking
      register: chrony_status
      changed_when: false
      failed_when: "'Leap status     : Normal' not in chrony_status.stdout"

    - name: "Verify | Firewalld actif"
      ansible.builtin.systemd:
        name: firewalld
        state: started
      check_mode: true
      register: firewalld_check
      failed_when: firewalld_check.changed

    - name: "Verify | Keytab Kerberos présent (clients IPA uniquement)"
      ansible.builtin.command: klist -k /etc/krb5.keytab
      register: keytab_check
      changed_when: false
      failed_when: keytab_check.rc != 0
      when: common_ipa_enroll | default(false) | bool

- name: "Vérification, FreeIPA Server"
  hosts: ipaservers
  become: true
  gather_facts: false

  tasks:
    - name: "Verify | Services IPA actifs (ipactl status)"
      ansible.builtin.command: ipactl status
      register: ipa_status
      changed_when: false
      failed_when: "'RUNNING' not in ipa_status.stdout"

- name: "Vérification, reverse proxy"
  hosts: proxies
  become: true
  gather_facts: false

  tasks:
    - name: "Verify | Nginx actif"
      ansible.builtin.systemd:
        name: nginx
        state: started
      check_mode: true
      register: nginx_check
      failed_when: nginx_check.changed

    - name: "Verify | Configuration nginx valide"
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: "Verify | Certificat TLS en état MONITORING"
      ansible.builtin.command: getcert list -f /etc/pki/tls/certs/proxy01.adlin.lab.crt
      register: cert_status
      changed_when: false
      failed_when: "'status: MONITORING' not in cert_status.stdout"

- name: "Vérification, Nextcloud"
  hosts: nextcloud
  become: true
  gather_facts: false

  tasks:
    - name: "Verify | Nextcloud — occ status"
      ansible.builtin.command: >
        sudo -u apache php /var/www/html/nextcloud/occ status --output=json
      register: nc_status
      changed_when: false
      failed_when: >
        nc_status.rc != 0 or
        (nc_status.stdout | from_json).installed is not true

    - name: "Verify | Apache en écoute sur 443"
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: 443
        timeout: 10
      changed_when: false

- name: "Vérification, mailserver"
  hosts: mailservers
  become: true
  gather_facts: false

  tasks:
    - name: "Verify | Postfix actif"
      ansible.builtin.systemd:
        name: postfix
        state: started
      check_mode: true
      register: postfix_check
      failed_when: postfix_check.changed

    - name: "Verify | Dovecot actif"
      ansible.builtin.systemd:
        name: dovecot
        state: started
      check_mode: true
      register: dovecot_check
      failed_when: dovecot_check.changed

    - name: "Verify | SOGo actif"
      ansible.builtin.systemd:
        name: sogod
        state: started
      check_mode: true
      register: sogo_check
      failed_when: sogo_check.changed

    - name: "Verify | Rspamd actif"
      ansible.builtin.systemd:
        name: rspamd
        state: started
      check_mode: true
      register: rspamd_check
      failed_when: rspamd_check.changed

    - name: "Verify | SMTP port 25 en écoute"
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: 25
        timeout: 10
      changed_when: false

    - name: "Verify | IMAPS port 993 en écoute"
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: 993
        timeout: 10
      changed_when: false

- name: "Vérification, Odoo"
  hosts: odoo
  become: true
  gather_facts: false

  tasks:
    - name: "Verify | Service odoo actif"
      ansible.builtin.systemd:
        name: odoo
        state: started
      check_mode: true
      register: odoo_check
      failed_when: odoo_check.changed

    - name: "Verify | Page de login Odoo répond HTTP 200 sur port 8069"
      ansible.builtin.uri:
        url: "http://127.0.0.1:8069/web/login"
        status_code: 200
        timeout: 30
      changed_when: false

    - name: "Verify | Port longpolling 8072 en écoute"
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: 8072
        timeout: 10
      changed_when: false

- name: "Vérification, Rocket.Chat"
  hosts: chat
  become: true
  gather_facts: false

  tasks:
    - name: "Verify | Stack Docker Compose en cours d'exécution"
      ansible.builtin.command:
        cmd: docker compose ps --status running --format json
        chdir: /opt/rocketchat
      register: compose_ps
      changed_when: false
      failed_when: >
        compose_ps.rc != 0 or
        'rocketchat' not in compose_ps.stdout

    - name: "Verify | Rocket.Chat répond sur port 3000"
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: 3000
        timeout: 30
      changed_when: false

- name: "Vérification, FreePBX"
  hosts: pbx
  become: true
  gather_facts: false

  tasks:
    - name: "Verify | Asterisk opérationnel"
      ansible.builtin.command: asterisk -rx "core show version"
      register: asterisk_version
      changed_when: false
      failed_when: asterisk_version.rc != 0

    - name: "Verify | FreePBX web admin répond sur port 80"
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: 80
        timeout: 10
      changed_when: false

    - name: "Verify | Keytab Kerberos présent (enrollment IPA)"
      ansible.builtin.command: klist -k /etc/krb5.keytab
      register: keytab_pbx
      changed_when: false
      failed_when: keytab_pbx.rc != 0
