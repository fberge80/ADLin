---
# playbooks/site.yml
#
# Playbook master, exécute toute l infrastructure ADLin dans l ordre des
# dépendances décrites dans docs/DEPLOYMENT_PLAN.md.
#
# Usage :
#   ansible-playbook playbooks/site.yml
#   make deploy-all
#
# Pour un déploiement partiel ciblé, préférer les playbooks individuels
# ou les cibles make dédiées (deploy-common, deploy-freeipa, etc.).

# -----------------------------------------------------------------------------
# Phase 1, fondations
# -----------------------------------------------------------------------------

- import_playbook: 00-common.yml  # noqa: name[play]
- import_playbook: 01-freeipa-server.yml  # noqa: name[play]

# -----------------------------------------------------------------------------
# Phase 2, reverse proxy + TLS
# -----------------------------------------------------------------------------

- import_playbook: 02-reverse-proxy.yml  # noqa: name[play]

# -----------------------------------------------------------------------------
# Phase 3, services de productivité
# -----------------------------------------------------------------------------

- import_playbook: 03-nextcloud.yml  # noqa: name[play]
- import_playbook: 04-mailserver.yml  # noqa: name[play]
- import_playbook: 05-rocketchat.yml  # noqa: name[play]

# -----------------------------------------------------------------------------
# Phase 4, services métier
# -----------------------------------------------------------------------------

- import_playbook: 06-odoo.yml  # noqa: name[play]
- import_playbook: 07-freepbx.yml  # noqa: name[play]
